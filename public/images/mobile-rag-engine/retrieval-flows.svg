<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="-apple-system, 'Apple SD Gothic Neo', 'Helvetica Neue', Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">mobile_rag_engine ingest and query paths</title>
  <desc id="desc">Two concrete flows in the package: document ingest path and user query path.</desc>
  <defs>
    <style>
      .h1 { font-size: 27px; font-weight: 700; fill: #0f172a; letter-spacing: -0.3px; }
      .lead { font-size: 13px; fill: #475569; }
      .h2 { font-size: 18px; font-weight: 700; fill: #0f172a; }
      .tag { font-size: 12px; font-weight: 700; fill: #ffffff; letter-spacing: 1px; }
      .step { font-size: 15px; font-weight: 650; fill: #0f172a; }
      .desc { font-size: 12.5px; fill: #475569; }
      .note { font-size: 11.5px; fill: #64748b; font-style: italic; }
      .phase { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
      .arrow-teal { stroke: #0f766e; stroke-width: 2; fill: none; marker-end: url(#arr-t); }
      .arrow-indigo { stroke: #4f46e5; stroke-width: 2; fill: none; marker-end: url(#arr-i); }
      .arrow-soft { stroke: #a5b4fc; stroke-width: 1.8; fill: none; marker-end: url(#arr-i); stroke-dasharray: 6 5; }
    </style>
    <marker id="arr-t" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
    <marker id="arr-i" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4f46e5"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#f8fafc"/>
  <text x="60" y="56" class="h1">mobile_rag_engine - ingest and query paths</text>
  <text x="60" y="82" class="lead">The implementation proof is clearer when the package work is split into the write path and the read path.</text>

  <rect x="60" y="120" width="160" height="32" rx="16" fill="#0f766e"/>
  <text x="140" y="141" text-anchor="middle" class="tag">INGEST PATH</text>
  <text x="236" y="143" class="h2">Document to searchable local corpus</text>

  <g>
    <rect x="60" y="180" width="170" height="118" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle cx="86" cy="208" r="16" fill="#0f766e"/>
    <text x="86" y="213" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">1</text>
    <text x="112" y="213" class="step">Load files</text>
    <text x="76" y="244" class="desc">PDF, DOCX, Markdown</text>
    <text x="76" y="262" class="desc">or plain text notes</text>
    <text x="76" y="282" class="note">local source only</text>
  </g>
  <g>
    <rect x="270" y="180" width="170" height="118" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle cx="296" cy="208" r="16" fill="#0f766e"/>
    <text x="296" y="213" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2</text>
    <text x="322" y="213" class="step">Chunk text</text>
    <text x="286" y="244" class="desc">stable chunk ids</text>
    <text x="286" y="262" class="desc">source metadata</text>
    <text x="286" y="282" class="note">parser caveats explicit</text>
  </g>
  <g>
    <rect x="480" y="180" width="170" height="118" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle cx="506" cy="208" r="16" fill="#0f766e"/>
    <text x="506" y="213" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">3</text>
    <text x="532" y="213" class="step">Embed</text>
    <text x="496" y="244" class="desc">ONNX embeddings</text>
    <text x="496" y="262" class="desc">inside the app</text>
    <text x="496" y="282" class="note">no external API call</text>
  </g>
  <g>
    <rect x="690" y="180" width="170" height="118" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle cx="716" cy="208" r="16" fill="#0f766e"/>
    <text x="716" y="213" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">4</text>
    <text x="742" y="213" class="step">Persist</text>
    <text x="706" y="244" class="desc">SQLite chunks</text>
    <text x="706" y="262" class="desc">and vectors</text>
    <text x="706" y="282" class="note">mobile sandbox</text>
  </g>
  <g>
    <rect x="900" y="180" width="170" height="118" rx="12" fill="#ecfeff" stroke="#0f766e" stroke-width="2.3"/>
    <circle cx="926" cy="208" r="16" fill="#0f766e"/>
    <text x="926" y="213" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">5</text>
    <text x="952" y="213" class="step">Write indexes</text>
    <text x="916" y="244" class="desc">HNSW vector</text>
    <text x="916" y="262" class="desc">BM25 sparse</text>
    <text x="916" y="282" class="note">ready for query</text>
  </g>

  <path class="arrow-teal" d="M232 239 L268 239"/>
  <path class="arrow-teal" d="M442 239 L478 239"/>
  <path class="arrow-teal" d="M652 239 L688 239"/>
  <path class="arrow-teal" d="M862 239 L898 239"/>

  <text x="600" y="338" text-anchor="middle" class="note">Ingest is the slow, stateful path: parse, embed, persist, and build local indexes before users query.</text>

  <line x1="60" y1="382" x2="1140" y2="382" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="60" y="420" width="160" height="32" rx="16" fill="#4f46e5"/>
  <text x="140" y="441" text-anchor="middle" class="tag">QUERY PATH</text>
  <text x="236" y="443" class="h2">User question to LLM-ready context</text>

  <text x="60" y="486" class="phase" fill="#4338ca">PHASE A - retrieve candidates</text>
  <text x="60" y="506" class="note">query embedding and lexical search run as separate evidence paths</text>

  <g>
    <rect x="60" y="526" width="168" height="110" rx="12" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="78" y="555" class="step">Query input</text>
    <text x="78" y="584" class="desc">natural-language</text>
    <text x="78" y="602" class="desc">question or prompt</text>
  </g>
  <g>
    <rect x="268" y="526" width="168" height="110" rx="12" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="286" y="555" class="step">Embed query</text>
    <text x="286" y="584" class="desc">ONNX runtime</text>
    <text x="286" y="602" class="desc">same local model</text>
  </g>
  <g>
    <rect x="476" y="526" width="168" height="110" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.8"/>
    <text x="494" y="555" class="step">HNSW vector</text>
    <text x="494" y="584" class="desc">semantic nearest</text>
    <text x="494" y="602" class="desc">chunk candidates</text>
  </g>
  <g>
    <rect x="684" y="526" width="168" height="110" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.8"/>
    <text x="702" y="555" class="step">BM25 sparse</text>
    <text x="702" y="584" class="desc">exact term and</text>
    <text x="702" y="602" class="desc">keyword candidates</text>
  </g>
  <g>
    <rect x="892" y="526" width="208" height="110" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.3"/>
    <text x="912" y="555" class="step">Fuse and trim</text>
    <text x="912" y="584" class="desc">ranking fusion creates</text>
    <text x="912" y="602" class="desc">context-ready chunks</text>
  </g>

  <path class="arrow-indigo" d="M230 581 L266 581"/>
  <path class="arrow-indigo" d="M438 581 L474 581"/>
  <path class="arrow-indigo" d="M646 581 L682 581"/>
  <path class="arrow-indigo" d="M854 581 L890 581"/>

  <text x="60" y="704" class="phase" fill="#4338ca">PHASE B - package response and evidence</text>
  <text x="60" y="724" class="note">separate vector recall from hybrid ranking behavior</text>

  <g>
    <rect x="60" y="746" width="330" height="88" rx="12" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="82" y="776" class="step">LLM-ready context</text>
    <text x="82" y="802" class="desc">selected chunks, source refs, and scores</text>
  </g>
  <g>
    <rect x="430" y="746" width="330" height="88" rx="12" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="452" y="776" class="step">Recall quality report</text>
    <text x="452" y="802" class="desc">PR-P5-1.html: vector-only mean 1.00</text>
  </g>
  <g>
    <rect x="800" y="746" width="330" height="88" rx="12" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="822" y="776" class="step">Latency reports</text>
    <text x="822" y="802" class="desc">PR-P3 / PR-P4: activate and embed timing</text>
  </g>

  <path class="arrow-soft" d="M998 638 L998 692 L225 692 L225 744"/>
  <path class="arrow-soft" d="M998 638 L998 692 L595 692 L595 744"/>
  <path class="arrow-soft" d="M998 638 L998 692 L965 692 L965 744"/>

  <text x="600" y="870" text-anchor="middle" class="note">The card should read as an engine implementation with evidence, not as a Gemma demo app screenshot.</text>
</svg>
