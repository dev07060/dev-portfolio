<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 980" font-family="-apple-system, 'Apple SD Gothic Neo', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .h1 { font-size: 26px; font-weight: 700; fill: #0f172a; letter-spacing: -0.3px; }
      .h2 { font-size: 13px; font-weight: 700; fill: #fff; letter-spacing: 1.2px; }
      .layer { font-size: 17px; font-weight: 700; fill: #0f172a; }
      .step { font-size: 14.5px; font-weight: 600; fill: #0f172a; }
      .desc { font-size: 12px; fill: #475569; }
      .note { font-size: 11.5px; fill: #64748b; font-style: italic; }
      .tag { font-size: 11px; font-weight: 600; fill: #475569; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; fill: none; marker-end: url(#arr); }
      .arrow-soft { stroke: #94a3b8; stroke-width: 1.6; fill: none; marker-end: url(#arr-s); stroke-dasharray: 5 4; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
    <marker id="arr-s" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="60" y="56" class="h1">법령 정보 엔진 — 시스템 구성</text>
  <text x="60" y="80" class="desc">공식 법령 데이터를 수집해 검색 가능한 형태로 가공하고, LLM이 인용 가능한 응답을 제공하는 파이프라인</text>

  <!-- ============================================== -->
  <!-- Layer 1: 외부 데이터 원천 -->
  <rect x="60" y="116" width="100" height="28" rx="14" fill="#0f172a"/>
  <text x="110" y="135" text-anchor="middle" class="h2">SOURCE</text>
  <text x="176" y="137" class="layer">공식 데이터 원천</text>

  <g>
    <rect x="60"  y="160" width="340" height="92" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="80" y="186" class="step">국가법령정보 Open API</text>
    <text x="80" y="210" class="desc">법령 본문의 정식 출처</text>
    <text x="80" y="228" class="desc">XML · JSON 구조화 응답</text>
  </g>
  <g>
    <rect x="430" y="160" width="340" height="92" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="450" y="186" class="step">전자관보 PDF</text>
    <text x="450" y="210" class="desc">공포 원문 증거로만 보관</text>
    <text x="450" y="228" class="desc">법령 본문 파싱은 하지 않음</text>
  </g>
  <g>
    <rect x="800" y="160" width="340" height="92" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="820" y="186" class="step">판례 · 행정해석</text>
    <text x="820" y="210" class="desc">법령 조문에 대응되는</text>
    <text x="820" y="228" class="desc">실무 해석 코퍼스</text>
  </g>

  <!-- arrow from L1 to L2 -->
  <path class="arrow" d="M600 256 L600 290"/>

  <!-- ============================================== -->
  <!-- Layer 2: 데이터 정제 파이프라인 -->
  <rect x="60" y="304" width="100" height="28" rx="14" fill="#b45309"/>
  <text x="110" y="323" text-anchor="middle" class="h2">PIPELINE</text>
  <text x="176" y="325" class="layer">데이터 정제 파이프라인 — 3단 lake</text>

  <g>
    <rect x="60"  y="348" width="340" height="118" rx="12" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
    <text x="80" y="374" class="step">Bronze · 원본 보존</text>
    <text x="80" y="398" class="desc">공식 API 응답과 PDF를</text>
    <text x="80" y="416" class="desc">SHA-256과 함께 그대로 저장</text>
    <text x="80" y="442" class="note">재현성 보장 · 재처리 시작점</text>
  </g>
  <g>
    <rect x="430" y="348" width="340" height="118" rx="12" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <text x="450" y="374" class="step">Silver · 구조 정규화</text>
    <text x="450" y="398" class="desc">조문 · 항 · 호 트리로 변환</text>
    <text x="450" y="416" class="desc">법령군 · 시행일 · 부처 메타</text>
    <text x="450" y="442" class="note">파싱 실패는 격리 보관</text>
  </g>
  <g>
    <rect x="800" y="348" width="340" height="118" rx="12" fill="#fde68a" stroke="#b45309" stroke-width="1.5"/>
    <text x="820" y="374" class="step">Gold · 검색용 가공</text>
    <text x="820" y="398" class="desc">조문 단위 청크 + 인용 메타</text>
    <text x="820" y="416" class="desc">임베딩 입력 형태로 정렬</text>
    <text x="820" y="442" class="note">검색·분석 계층의 단일 소스</text>
  </g>
  <!-- inline arrows in pipeline -->
  <path class="arrow" d="M402 407 L428 407"/>
  <path class="arrow" d="M772 407 L798 407"/>

  <!-- arrow from L2 to L3 -->
  <path class="arrow" d="M600 470 L600 504"/>

  <!-- ============================================== -->
  <!-- Layer 3: 색인 · 지식그래프 -->
  <rect x="60" y="518" width="100" height="28" rx="14" fill="#4338ca"/>
  <text x="110" y="537" text-anchor="middle" class="h2">INDEX · KG</text>
  <text x="176" y="539" class="layer">색인 · 지식그래프 — 검색 가능한 형태로 변환</text>

  <g>
    <rect x="60"  y="562" width="530" height="124" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="80" y="588" class="step">의미 기반 검색 색인</text>
    <text x="80" y="612" class="desc">조문 청크를 임베딩 벡터로 색인</text>
    <text x="80" y="630" class="desc">자연어 질의 → 유사도 기반 후보 수집</text>
    <text x="80" y="650" class="desc">LLM 리랭커로 최종 순위 보정</text>
    <text x="80" y="674" class="note">벡터DB는 선택형 backend</text>
  </g>
  <g>
    <rect x="610" y="562" width="530" height="124" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <text x="630" y="588" class="step">조문 관계 지식그래프</text>
    <text x="630" y="612" class="desc">법령 · 판례 · 특별법 간 관계를 그래프로 보관</text>
    <text x="630" y="630" class="desc">앵커 조문에서 인접 조문·판례로 확장 탐색</text>
    <text x="630" y="650" class="desc">정밀도 게이트로 노이즈 차단 · 품질 감사 자동화</text>
    <text x="630" y="674" class="note">버전 스냅샷 단위로 운영</text>
  </g>

  <!-- arrow from L3 to L4 -->
  <path class="arrow" d="M600 690 L600 724"/>

  <!-- ============================================== -->
  <!-- Layer 4: 분석 엔진 -->
  <rect x="60" y="738" width="100" height="28" rx="14" fill="#9333ea"/>
  <text x="110" y="757" text-anchor="middle" class="h2">ANALYSIS</text>
  <text x="176" y="759" class="layer">분석 엔진 — 법률 자문 형태로 답변 생성</text>

  <g>
    <rect x="60"  y="782" width="340" height="112" rx="12" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
    <text x="80" y="808" class="step">쟁점 분해 · 검색 계획</text>
    <text x="80" y="832" class="desc">질문을 핵심 쟁점으로 분리하고</text>
    <text x="80" y="850" class="desc">쟁점별 검색 쿼리를 LLM이 설계</text>
    <text x="80" y="876" class="note">전처리로 비법률 질의는 사전 차단</text>
  </g>
  <g>
    <rect x="430" y="782" width="340" height="112" rx="12" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
    <text x="450" y="808" class="step">증거 규칙 · 의도 보정</text>
    <text x="450" y="832" class="desc">법령군별 필수 증거 규칙을 적용해</text>
    <text x="450" y="850" class="desc">근거 누락 시 추가 검색을 자동 트리거</text>
    <text x="450" y="876" class="note">규칙은 설정 파일로 운영자가 관리</text>
  </g>
  <g>
    <rect x="800" y="782" width="340" height="112" rx="12" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
    <text x="820" y="808" class="step">판례 매칭 · 신뢰도 표기</text>
    <text x="820" y="832" class="desc">각 쟁점에 대응하는 판례를 연결하고</text>
    <text x="820" y="850" class="desc">근거 강도를 신뢰도 밴드로 노출</text>
    <text x="820" y="876" class="note">자문 수준 응답을 자동 합성</text>
  </g>

  <!-- arrow from L4 to L5 -->
  <path class="arrow" d="M600 898 L600 932"/>

  <!-- ============================================== -->
  <!-- Layer 5: 사용자 인터페이스 -->
  <g>
    <rect x="60"  y="940" width="1080" height="20" rx="10" fill="#0f172a"/>
    <text x="600" y="955" text-anchor="middle" class="h2">REST API · 웹 검색 UI · CLI — 외부 사용자는 인증 키 없이 조회</text>
  </g>

  <!-- Side annotation (offset, no crossing arrows) -->
  <g transform="translate(60,896)">
    <!-- intentionally left blank for clean composition -->
  </g>
</svg>
